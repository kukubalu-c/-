<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' http://localhost:3000;">
    <title>企业专利全生命周期管理系统</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 作用：应用密码锁页面 -->
    <!-- 数据来源：用户输入 -->
    <div id="loginPage" class="page">
        <div class="login-container">
            <h1>🔒 企业专利管理系统</h1>
            <p class="login-subtitle">请输入应用密码</p>
            <!-- 作用：密码输入框 -->
            <input type="password" id="passwordInput" placeholder="请输入密码" autofocus>
            <!-- 作用：登录按钮 -->
            <button id="loginBtn" class="btn-primary">解锁</button>
            <!-- 作用：错误提示 -->
            <p id="loginError" class="error-msg hidden">密码错误，请重试</p>
        </div>
    </div>

    <!-- 作用：首次使用密码设置页面 -->
    <div id="setupPage" class="page hidden">
        <div class="login-container">
            <h1>🔒 首次使用</h1>
            <p class="login-subtitle">请设置应用密码</p>
            <input type="password" id="setupPasswordInput" placeholder="请输入密码">
            <input type="password" id="setupConfirmInput" placeholder="请确认密码">
            <button id="setupBtn" class="btn-primary">确认设置</button>
            <p id="setupError" class="error-msg hidden">密码不匹配或为空</p>
        </div>
    </div>

    <!-- 作用：应用主界面（登录后显示） -->
    <div id="appPage" class="page hidden">
        <!-- 作用：应用主布局（左侧边栏 + 右侧内容） -->
        <div class="app-layout">
            <!-- 作用：左侧边栏导航 -->
            <!-- 样式参考：Ant Design Pro 经典深色侧边栏 -->
            <aside class="sidebar">
                <!-- 作用：顶部 Logo 标题区 -->
                <div class="sidebar-logo">
                    专利管理系统
                </div>
                <!-- 作用：导航菜单 -->
                <nav class="sidebar-nav">
                    <!-- data-page 用于 JS 切换页面 -->
                    <button class="nav-item active" data-page="dashboard">
                        <span class="nav-icon">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
                        </span>
                        <span class="nav-text">仪表盘</span>
                    </button>
                    <button class="nav-item" data-page="workbench">
                        <span class="nav-icon">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
                        </span>
                        <span class="nav-text">工作台</span>
                    </button>
                    <button class="nav-item" data-page="datahub">
                        <span class="nav-icon">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
                        </span>
                        <span class="nav-text">数据中心</span>
                    </button>
                </nav>
            </aside>

            <!-- 作用：右侧主内容区 -->
            <main class="main-content">
                <!-- 作用：页面内容容器 -->
                <div id="dashboardPage" class="page-content active">
                    <div class="placeholder">
                        <div class="placeholder-icon">
                            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
                        </div>
                        <h3>仪表盘</h3>
                        <p>专利数据可视化分析看板</p>
                        <span class="placeholder-badge">待开发</span>
                    </div>
                </div>

                <div id="workbenchPage" class="page-content">
                    <!-- 作用：工作台功能按钮区 -->
                    <div class="wb-toolbar">
                        <button class="btn btn-primary" id="btnManualEntry">新增</button>
                    </div>
                    <!-- 作用：手动录入表单（点击按钮后显示） -->
                    <div id="manualFormCard" class="card hidden" style="margin-bottom:16px;">
                        <div class="card-header">
                            <span class="card-title">新增专利</span>
                        </div>
                        <div class="card-body">
                            <form id="patentForm">
                                <div class="form-row">
                                    <div class="form-group">
                                        <label>专利号/申请号 <span class="required">*</span></label>
                                        <input type="text" id="fPatentNo" placeholder="如 202310123456.7">
                                        <span class="field-hint">13位数字 + 小数点 + 1位校验位</span>
                                        <span id="fPatentNoError" class="field-error hidden"></span>
                                    </div>
                                    <div class="form-group">
                                        <label>专利名称 <span class="required">*</span></label>
                                        <input type="text" id="fPatentName" placeholder="请输入专利名称">
                                    </div>
                                </div>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label>专利类型 <span class="required">*</span></label>
                                        <select id="fPatentType">
                                            <option value="">请选择</option>
                                            <option value="发明">发明</option>
                                            <option value="实用新型">实用新型</option>
                                            <option value="外观设计">外观设计</option>
                                        </select>
                                    </div>
                                    <div class="form-group">
                                        <label>权利状态</label>
                                        <select id="fStatus">
                                            <option value="撰写中">撰写中</option>
                                            <option value="已申请">已申请</option>
                                            <option value="已受理">已受理</option>
                                            <option value="形式审查中">形式审查中</option>
                                            <option value="实质审查中">实质审查中</option>
                                            <option value="OA答复中">OA答复中</option>
                                            <option value="通知授权">通知授权</option>
                                            <option value="专利权生效">专利权生效</option>
                                            <option value="已驳回">已驳回</option>
                                            <option value="已撤回">已撤回</option>
                                            <option value="已终止">已终止</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label>发明人</label>
                                        <input type="text" id="fInventor" placeholder="多个发明人用逗号分隔">
                                    </div>
                                    <div class="form-group">
                                        <label>申请人</label>
                                        <input type="text" id="fApplicant" placeholder="申请人名称">
                                    </div>
                                </div>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label>申请日期</label>
                                        <input type="date" id="fApplyDate">
                                    </div>
                                    <div class="form-group">
                                        <label>授权公告日</label>
                                        <input type="date" id="fAuthorizeDate">
                                    </div>
                                </div>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label>费减比例</label>
                                        <select id="fFeeReduction">
                                            <option value="无">无（全额）</option>
                                            <option value="个人">个人（85%费减）</option>
                                            <option value="小微企业">小微企业（85%费减）</option>
                                            <option value="普通企业">普通企业（70%费减）</option>
                                            <option value="事业高校">事业高校（100%费减）</option>
                                        </select>
                                    </div>
                                    <div class="form-group">
                                        <label>备注</label>
                                        <input type="text" id="fNotes" placeholder="可选备注信息">
                                    </div>
                                </div>
                                <div class="form-actions">
                                    <span id="fFormMessage" class="form-msg hidden"></span>
                                    <button type="button" class="btn btn-primary" id="btnSavePatent">保存</button>
                                    <button type="button" class="btn btn-default" id="btnResetForm">重置</button>
                                </div>
                            </form>
                        </div>
                    </div>
                    <!-- 作用：专利列表区域（后续阶段开发） -->
                    <div class="placeholder" id="patentListPlaceholder">
                        <div class="placeholder-icon">
                            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
                        </div>
                        <h3>工作台</h3>
                        <p>点击上方"新增"开始录入专利</p>
                        <span class="placeholder-badge">专利列表待开发</span>
                    </div>
                </div>

                <div id="datahubPage" class="page-content">
                    <!-- 作用：数据中心子标签导航 -->
                    <div class="sub-tabs">
                        <button class="sub-tab active" data-subpage="import">Excel导入</button>
                        <button class="sub-tab" data-subpage="export">导出</button>
                        <button class="sub-tab" data-subpage="recycle">回收站</button>
                    </div>

                    <!-- ====== Excel导入 ====== -->
                    <div id="subImport" class="sub-page active">
                        <div class="card">
                            <div class="card-header">
                                <span class="card-title">Excel 批量导入</span>
                            </div>
                            <div class="card-body">
                                <div class="import-actions">
                                    <button class="btn btn-default" id="btnDownloadTemplate">下载导入模板</button>
                                    <div class="import-upload-area" id="uploadArea">
                                        <p>点击选择 .xlsx 文件</p>
                                        <p class="upload-hint">支持 .xlsx 格式，表头自动匹配</p>
                                        <input type="file" id="fileInput" accept=".xlsx" class="hidden">
                                    </div>
                                </div>
                                <!-- 作用：导入预览表格 -->
                                <div id="importPreview" class="hidden">
                                    <h4>导入预览</h4>
                                    <div id="importTableWrapper"></div>
                                    <div id="importErrors" class="import-errors"></div>
                                    <div class="form-actions">
                                        <button class="btn btn-primary" id="btnConfirmImport">确认导入</button>
                                        <button class="btn btn-default" id="btnCancelImport">取消</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- ====== 导出 ====== -->
                    <div id="subExport" class="sub-page">
                        <div class="card">
                            <div class="card-header"><span class="card-title">数据导出</span></div>
                            <div class="card-body">
                                <div class="export-fields">
                                    <p class="text-muted mb-16">选择要导出的字段：</p>
                                    <div class="checkbox-grid">
                                        <label class="checkbox-item"><input type="checkbox" class="export-field" value="patent_no" checked> 专利号</label>
                                        <label class="checkbox-item"><input type="checkbox" class="export-field" value="patent_name" checked> 专利名称</label>
                                        <label class="checkbox-item"><input type="checkbox" class="export-field" value="patent_type" checked> 专利类型</label>
                                        <label class="checkbox-item"><input type="checkbox" class="export-field" value="inventor" checked> 发明人</label>
                                        <label class="checkbox-item"><input type="checkbox" class="export-field" value="applicant" checked> 申请人</label>
                                        <label class="checkbox-item"><input type="checkbox" class="export-field" value="apply_date" checked> 申请日期</label>
                                        <label class="checkbox-item"><input type="checkbox" class="export-field" value="authorize_date"> 授权公告日</label>
                                        <label class="checkbox-item"><input type="checkbox" class="export-field" value="status" checked> 权利状态</label>
                                        <label class="checkbox-item"><input type="checkbox" class="export-field" value="fee_reduction"> 费减比例</label>
                                        <label class="checkbox-item"><input type="checkbox" class="export-field" value="notes"> 备注</label>
                                    </div>
                                </div>
                                <div class="form-actions">
                                    <button class="btn btn-primary" id="btnExport">导出 Excel</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- ====== 回收站 ====== -->
                    <div id="subRecycle" class="sub-page">
                        <!-- 回收站内容 -->
                        <div class="card" style="margin-bottom:16px;">
                            <div class="card-header"><span class="card-title">回收站</span></div>
                            <div class="card-body">
                                <div id="recycleList">
                                    <table class="import-table">
                                        <thead><tr>
                                            <th>专利号</th><th>名称</th><th>类型</th><th>删除时间</th><th>操作</th>
                                        </tr></thead>
                                        <tbody id="recycleBody">
                                            <tr id="recycleEmpty"><td colspan="5" class="text-center text-muted">回收站为空</td></tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                        <!-- 备份查看入口 -->
                        <div class="card">
                            <div class="card-header">
                                <span class="card-title">数据备份</span>
                                <button class="btn btn-default btn-sm" id="btnRefreshBackups" style="float:right;">刷新</button>
                            </div>
                            <div class="card-body">
                                <div id="backupList">
                                    <table class="import-table">
                                        <thead><tr>
                                            <th>备份文件</th><th>大小</th><th>备份时间</th><th>备份地址</th>
                                        </tr></thead>
                                        <tbody id="backupBody">
                                            <tr><td colspan="4" class="text-center text-muted">加载中...</td></tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="/node_modules/xlsx/dist/xlsx.full.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/login.js"></script>
    <script src="js/workbench.js"></script>
    <script src="js/datahub.js"></script>
</body>
</html>
