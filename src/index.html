<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' http://localhost:3000;">
    <title>企业专利全生命周期管理系统</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 作用：应用密码锁页面 -->
    <!-- 数据来源：用户输入 -->
    <div id="loginPage" class="page">
        <div class="login-container">
            <h1>🔒 企业专利管理系统</h1>
            <p class="login-subtitle">请输入应用密码</p>
            <!-- 作用：密码输入框 -->
            <input type="password" id="passwordInput" placeholder="请输入密码" autofocus>
            <!-- 作用：登录按钮 -->
            <button id="loginBtn" class="btn-primary">解锁</button>
            <!-- 作用：错误提示 -->
            <p id="loginError" class="error-msg hidden">密码错误，请重试</p>
        </div>
    </div>

    <!-- 作用：首次使用密码设置页面 -->
    <div id="setupPage" class="page hidden">
        <div class="login-container">
            <h1>🔒 首次使用</h1>
            <p class="login-subtitle">请设置应用密码</p>
            <input type="password" id="setupPasswordInput" placeholder="请输入密码">
            <input type="password" id="setupConfirmInput" placeholder="请确认密码">
            <button id="setupBtn" class="btn-primary">确认设置</button>
            <p id="setupError" class="error-msg hidden">密码不匹配或为空</p>
        </div>
    </div>

    <!-- 作用：应用主界面（登录后显示） -->
    <div id="appPage" class="page hidden">
        <!-- 作用：应用主布局（左侧边栏 + 右侧内容） -->
        <div class="app-layout">
            <!-- 作用：左侧边栏导航 -->
            <!-- 样式参考：Ant Design Pro 经典深色侧边栏 -->
            <aside class="sidebar">
                <!-- 作用：顶部 Logo 标题区 -->
                <div class="sidebar-logo">
                    专利管理系统
                </div>
                <!-- 作用：导航菜单 -->
                <nav class="sidebar-nav">
                    <!-- data-page 用于 JS 切换页面 -->
                    <button class="nav-item active" data-page="dashboard">
                        <span class="nav-icon">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
                        </span>
                        <span class="nav-text">仪表盘</span>
                    </button>
                    <button class="nav-item" data-page="workbench">
                        <span class="nav-icon">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
                        </span>
                        <span class="nav-text">工作台</span>
                    </button>
                    <button class="nav-item" data-page="datahub">
                        <span class="nav-icon">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
                        </span>
                        <span class="nav-text">数据中心</span>
                    </button>
                </nav>
            </aside>

            <!-- 作用：右侧主内容区 -->
            <main class="main-content">
                <!-- 作用：页面内容容器 -->
                <div id="dashboardPage" class="page-content active">
                    <div class="placeholder">
                        <div class="placeholder-icon">
                            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
                        </div>
                        <h3>仪表盘</h3>
                        <p>专利数据可视化分析看板</p>
                        <span class="placeholder-badge">待开发</span>
                    </div>
                </div>

                <div id="workbenchPage" class="page-content">
                    <div class="placeholder">
                        <div class="placeholder-icon">
                            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
                        </div>
                        <h3>工作台</h3>
                        <p>专利管理与日常操作</p>
                        <span class="placeholder-badge">待开发</span>
                    </div>
                </div>

                <div id="datahubPage" class="page-content">
                    <div class="placeholder">
                        <div class="placeholder-icon">
                            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
                        </div>
                        <h3>数据中心</h3>
                        <p>专利数据导入与导出</p>
                        <span class="placeholder-badge">待开发</span>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
